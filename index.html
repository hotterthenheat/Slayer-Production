<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slayer Terminal — Institutional Options Intelligence</title>
    <meta name="description" content="Slayer Terminal — institutional-grade options intelligence. Real-time dealer GEX, gamma flip, expected move, and contract analytics for index and single-stock options." />
    <meta name="theme-color" content="#0A0A0B" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slayer Terminal" />
    <!-- Social / link-preview cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Slayer Terminal" />
    <meta property="og:title" content="Slayer Terminal — Institutional Options Intelligence" />
    <meta property="og:description" content="Real-time dealer GEX, gamma flip, expected move, and contract analytics for index and single-stock options." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Slayer Terminal — Institutional Options Intelligence" />
    <meta name="twitter:description" content="Real-time dealer GEX, gamma flip, expected move, and contract analytics." />
    <!-- Zero-flash display preferences: applied before first paint -->
    <script>
      (function () {
        try {
          var d = document.documentElement;
          var theme = localStorage.getItem('slayer_theme');
          if (theme) d.setAttribute('data-theme', theme);

          var sizeMap = { STANDARD: 'standard', ENHANCED: 'large', ENHANCED_XL: 'xlarge' };
          var ts = localStorage.getItem('slayer_text_size');
          if (ts && sizeMap[ts]) d.setAttribute('data-text-size', sizeMap[ts]);

          if (localStorage.getItem('slayer_compact') === 'true') d.setAttribute('data-compact', 'true');
          if (localStorage.getItem('slayer_ultrawide') === 'true') d.setAttribute('data-ultrawide', 'true');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
